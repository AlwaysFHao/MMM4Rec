seed: 2020
logger: 'BSARec-Scientific'

# model_config
hidden_size: 64
inner_size: 128
hidden_dropout_prob: 0.4
att_dropout_prob: 0.4
n_heads: 4
n_layers: 2
layer_norm_eps: 1e-12
initializer_range: 0.02
hidden_act: 'gelu'
model_compile: False
attn_dropout_prob: 0.5
mask_ratio: 0.2
c: 3
alpha: 0.9

# dataset config
batch_size: 2048
dataset_path: './dataset/amazon-2018/processed/Scientific'
max_len: 50

# trainer config
Epoch: 100
optimizer_lr: 0.001
weight_decay: 0.0001
stop_epoch: 10
#checkpoint: 'saved\SASRec\Scientific\2025-01-06_14-05-54\best_epoch_model.ckpt'

# eval config
top_k: [10, 50]
metrics: ['Hit', 'NDCG']
valid_metric: 'Hit@10'
metrics_table_displays: True