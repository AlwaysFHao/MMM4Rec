seed: 2020
logger: 'SASRec-Kindle'

# model_config
hidden_size: 64
inner_size: 256
hidden_dropout_prob: 0.5
att_dropout_prob: 0.5
n_heads: 2
n_layers: 2
layer_norm_eps: 1e-12
initializer_range: 0.02
hidden_act: 'gelu'
model_compile: False

# dataset config
batch_size: 512
dataset_path: './dataset/amazon-2018/processed/Kindle'
max_len: 5

# trainer config
Epoch: 100
optimizer_lr: 0.001
weight_decay: 0.0
stop_epoch: 10
shuffle: True

# eval config
top_k: [10, 20, 50]
metrics: ['Hit', 'NDCG']
valid_metric: 'NDCG@10'
metrics_table_displays: True